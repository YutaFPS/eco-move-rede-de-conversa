<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMove</title>
    <link rel="stylesheet" href="front.css">
</head>
<body>
            <aside id="aside">

            </aside>

            <div id="right">
                <div id="main" name="main">
                    <form id="fa" name="atividades">
                        <select name="tipo" class="input">
                            <option value="bicicleta">Bicicleta</option>
                            <option value="caminhada">Caminhada</option>
                            <option value="transportepublico">Transporte Público</option>
                        </select>
                            
                            <input type="text" class="input" name="nome" placeholder="Nome">
                            <input type="number" class="input" name="distancia_metros" placeholder="Distância (metros)">
                            <input type="number" class="input" name="duracao_minutos" placeholder="Duração (minutos)">
                            <input type="text" class="input" name="foto_url" placeholder="Foto">
                            <input type="number" class="input" name="co2_kg" placeholder="Emissão de CO2 (kg)">

                            <input type="submit" value="Enviar" onClick="post_atividades">

                        </select>
                     
                    </form>
                </div>
            </div>

           

    <script src="front.js"></script>
</body>
</html>
